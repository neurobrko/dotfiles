# Fonts/theme are optional—these just show context
# font-family = "JetBrainsMono Nerd Font"
# font-size = 13.0
theme = Spacedust
gtk-titlebar = false
gtk-tabs-location = hidden

# Slow down discrete mouse scroll (default discrete:3 is too fast)
mouse-scroll-multiplier = precision:1,discrete:1

# Terminator-like keymap overrides
config-file = "terminator.keymap"
